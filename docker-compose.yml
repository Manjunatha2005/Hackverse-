version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ecosentinel-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ecosentinel
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecosentinel-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL:        mongodb://mongodb:27017
      MONGODB_DB:         ecosentinel
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      SENDGRID_API_KEY:   ${SENDGRID_API_KEY}
      TWILIO_SID:         ${TWILIO_SID}
      TWILIO_TOKEN:       ${TWILIO_TOKEN}
      TWILIO_FROM:        ${TWILIO_FROM}
      GOVT_EMAILS:        ${GOVT_EMAILS:-govt@cpcb.gov.in}
      GOVT_PHONES:        ${GOVT_PHONES:-+911234567890}
      LSTM_MODEL_PATH:    /app/ml/model/lstm_pollution.h5
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecosentinel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL:  ws://localhost:8000
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ecosentinel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo-data:
    driver: local
